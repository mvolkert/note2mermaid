spring.application.name=note2mermaid

# SQLite Configuration
spring.datasource.url=jdbc:sqlite:db.sqlite
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Liquibase Configuration
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Ensure Liquibase runs before Hibernate validation
spring.jpa.defer-datasource-initialization=true

# LM Studio / LangChain4j Configuration
lmstudio.base-url=http://localhost:1234/v1
lmstudio.model-name=mistralai/ministral-3-3b

