databaseChangeLog:
  - changeSet:
      id: 001-create-notes-table
      author: note2mermaid
      changes:
        - createTable:
            tableName: notes
            columns:
              - column:
                  name: id
                  type: INTEGER
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: TEXT
              - column:
                  name: created_at
                  type: DATETIME
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: DATETIME
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP

